<!DOCTYPE html>
<html lang="hu">

<head>
  <script>
    // Synchronous flag to prevent Preamble detection errors
    window.__vite_plugin_react_preamble_installed__ = true;
  </script>
  <script type="module">
    if (location.port === '3002' || (location.hostname === 'localhost' && location.port === '8888')) {
      import("/@react-refresh").then(({ injectIntoGlobalHook }) => {
        injectIntoGlobalHook(window);
        window.$RefreshReg$ = () => { };
        window.$RefreshSig$ = () => (type) => type;
      }).catch(() => { });
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>visitKőszeg – Élmények. Élőben.</title>

  <link rel="icon" href="/favicon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- Apple & HIG Typography Font Stack (SF Pro Display / Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

  <meta name="theme-color" content="#A16207">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Analytics & Tag Manager Dynamic Integration -->
  <script>
    (function() {
      var gtmId = "%VITE_GTM_ID%";
      var verificationId = "%VITE_GOOGLE_SITE_VERIFICATION%";

      // Google Search Console Site Verification Meta Tag
      if (verificationId && !verificationId.startsWith("%") && verificationId.trim() !== "") {
        var meta = document.createElement('meta');
        meta.name = "google-site-verification";
        meta.content = verificationId;
        document.head.appendChild(meta);
      }

      window.dataLayer = window.dataLayer || [];
      function gtag() { dataLayer.push(arguments); }
      window.gtag = gtag;

      // Google Tag Manager or fallback Google Analytics (GA4)
      if (gtmId && !gtmId.startsWith("%") && gtmId.trim() !== "") {
        // Load Google Tag Manager
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer',gtmId);
      } else {
        // Fallback: load GA4 directly
        var gaId = "G-D0XMCLKMTC"; // Default GA4 ID
        var script = document.createElement('script');
        script.async = true;
        script.src = "https://www.googletagmanager.com/gtag/js?id=" + gaId;
        document.head.appendChild(script);

        gtag('js', new Date());
        gtag('config', gaId);
      }
    })();
  </script>

  <!-- Lazy képbetöltés MutationObserver-rel (React-kompatibilis) -->
  <script>
    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        mutation.addedNodes.forEach((node) => {
          if (node.tagName === 'IMG') {
            if (!node.hasAttribute('loading')) node.setAttribute('loading', 'lazy');
          } else if (node.querySelectorAll) {
            node.querySelectorAll('img').forEach((img) => {
              if (!img.hasAttribute('loading')) img.setAttribute('loading', 'lazy');
            });
          }
        });
      });
    });
    observer.observe(document.documentElement, { childList: true, subtree: true });
  </script>

</head>

<body class="bg-gray-50 text-gray-800">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
